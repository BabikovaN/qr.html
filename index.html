<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5efe6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.box {
  background:#fffaf3;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  max-width:350px;
}

h1 {
  font-size:20px;
  color:#8b0000;
}

p {
  font-size:14px;
  color:#2e2a26;
}

img {
  margin:15px 0;
  width:220px;
}

a {
  display:block;
  margin-top:10px;
  color:#1a4d2e;
  font-weight:bold;
  word-break:break-all;
}
</style>

</head>

<body>

<div class="box">

  <h1>🇺🇦 Подаруй паску воїну</h1>

  <p>Скануй QR або відкрий сайт:</p>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://babikovan.github.io/Give-a-warrior-an-Easter-gift-/" alt="QR">

  <a href="https://babikovan.github.io/Give-a-warrior-an-Easter-gift-/" target="_blank">
    https://babikovan.github.io/Give-a-warrior-an-Easter-gift-/
  </a>

</div>

</body>
</html>
